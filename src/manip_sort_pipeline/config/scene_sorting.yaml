sort_manager:
  ros__parameters:
    use_sim_time: true
    end_effector_link: gripper_tcp
    pose_reference_frame: base_link
    gripper_action_name: /gripper_controller/follow_joint_trajectory
    scan_named_target: up
    perception_topic: /detected_objects
    scan_timeout: 8.0
    perception_stale_after: 1.5
    pregrasp_z_offset: 0.14
    lift_z_offset: 0.18
    place_z_offset: 0.14
    retreat_z_offset: 0.18
    cartesian_avoid_collisions: true
    pick_retry_step: 0.004
    pick_retry_count: 0
    dry_run: false
    reset_objects_on_startup: true
    object_ids: [hammer, racket, dumbbell, key]
    objects:
      hammer:
        class_name: hammer
        color_name: red
        bin_id: 1
        bin_name: bin_1
